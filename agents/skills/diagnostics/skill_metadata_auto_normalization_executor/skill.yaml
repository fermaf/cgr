id: skill_metadata_auto_normalization_executor
version: 1
category: enrichment
owner: agents
description: >
  Ejecuta normalización automática controlada solo sobre el bucket auto_normalizable
  de metadata, con preview por defecto, apply restringido y trazabilidad local.
diagnostic_only: false
side_effects: >
  En modo apply puede actualizar enriquecimiento.etiquetas_json en un entorno aislado.
  Siempre escribe un audit trail local en agents/out/metadata-auto-normalization.
inputs:
  type: object
  additionalProperties: false
  properties:
    mode:
      type: string
      enum:
        - preview
        - apply
    targetEnvironment:
      type: string
      enum:
        - staging
        - local
    maxBatchSize:
      type: integer
    dryRun:
      type: boolean
    allowedNormalizationTypes:
      type: array
    allowIds:
      type: array
    includeExamples:
      type: boolean
outputs:
  type: object
  properties:
    summary:
      type: object
    candidate_count:
      type: integer
    applied_count:
      type: integer
    skipped_count:
      type: integer
    normalization_groups:
      type: array
    changes:
      type: array
    safety_checks:
      type: array
    write_summary:
      type: object
    stats:
      type: object
    severity:
      type: string
    next_actions:
      type: array
dependencies:
  - skill_metadata_remediation_planner
  - Cloudflare D1 REST API
  - wrangler.jsonc
  - .dev.vars
preconditions:
  - targetEnvironment explícito
  - preview por defecto
  - no usar production
  - apply solo con allowlist explícita y lote pequeño
failure_modes:
  - apply sin allowlist explícita
  - lote excede el límite seguro
  - faltan credenciales Cloudflare
  - candidate selection falla
  - drift entre before y valor actual al aplicar
evidence_policy:
  - Siempre guarda audit trail local con before/after, safety checks y grupos de normalización.
